<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
  --bg: #0d0d14;
  --surface: #16162a;
  --surface2: #1e1e38;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0ff;
  --muted: #6b6b8a;
  --card-done-bg: rgba(74,222,128,0.05);
  --card-done-border: rgba(74,222,128,0.2);
}

[data-theme="light"] {
  --bg: #f4f4ff;
  --surface: #ffffff;
  --surface2: #ebebf8;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --muted: #8888aa;
  --card-done-bg: rgba(34,197,94,0.07);
  --card-done-border: rgba(34,197,94,0.3);
}

:root {
  --accent: #7c6ff7;
  --accent2: #f06292;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 16px;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; padding-bottom: 80px; }

.header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(90deg, #7c6ff7, #f06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.streak { background: linear-gradient(135deg, #f06292, #7c6ff7); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #fff; }
.theme-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; cursor: pointer; color: var(--text); transition: all 0.2s; }
.subtitle { font-size: 13px; color: var(--muted); }

.tabs { display: flex; gap: 6px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 9px; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
.tab.active { background: var(--accent); color: #fff; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

.add-form { display: flex; gap: 8px; margin-bottom: 20px; }
.add-form input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; }
.add-form input:focus { border-color: var(--accent); }
.add-form input::placeholder { color: var(--muted); }
.add-btn { width: 48px; height: 48px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c6ff7, #f06292); color: #fff; font-size: 22px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

.section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; margin-bottom: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #7c6ff7, #f06292); transition: width 0.6s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }

.habit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; position: relative; overflow: hidden; }
.habit-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; opacity: 0; transition: opacity 0.2s; }
.habit-card.done::before { opacity: 1; background: var(--success); }
.habit-card.done { background: var(--card-done-bg); border-color: var(--card-done-border); }

.check-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 15px; color: transparent; }
.habit-card.done .check-btn { background: var(--success); border-color: var(--success); color: #fff; }

.habit-info { flex: 1; }
.habit-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
.habit-card.done .habit-name { color: var(--muted); text-decoration: line-through; }
.habit-meta { font-size: 12px; color: var(--muted); }

.delete-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 6px; border-radius: 8px; transition: all 0.2s; }
.delete-btn:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

.period-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.period-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.stat-name { font-size: 15px; font-weight: 500; }
.stat-pct { font-size: 22px; font-weight: 700; }
.bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.bar-green { background: linear-gradient(90deg, #4ade80, #22c55e); }
.bar-yellow { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.bar-red { background: linear-gradient(90deg, #f87171, #ef4444); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

.settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.settings-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; font-weight: 500; }
.setting-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.toggle { width: 44px; height: 26px; border-radius: 13px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle.off { background: var(--surface2); }
.toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 3px; transition: left 0.2s; }
.toggle.on::after { left: 21px; }
.toggle.off::after { left: 3px; }
.theme-options { display: flex; gap: 8px; }
.theme-opt { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
.theme-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(124,111,247,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Привычки</h1>
    <div class="header-actions">
      <div class="streak">🔥 <span id="streakCount">0</span></div>
    </div>
  </div>
  <div class="subtitle" id="todayDate"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('habits', this)">Сегодня</button>
  <button class="tab" onclick="switchTab('stats', this)">Статистика</button>
  <button class="tab" onclick="switchTab('settings', this)">Настройки</button>
</div>

<div id="habits" class="page active">
  <div class="add-form">
    <input type="text" id="newHabit" placeholder="Добавить привычку..." maxlength="60">
    <button class="add-btn" onclick="addHabit()">+</button>
  </div>
  <div class="section-label" id="progressLabel">0 из 0 выполнено</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span>0%</span><span id="progressPct">0%</span><span>100%</span></div>
  <div style="margin-top: 16px;" id="habitList"><div class="loading">Загрузка...</div></div>
</div>

<div id="stats" class="page">
  <div class="period-grid">
    <button class="period-btn active" onclick="loadStats(30, this)">30 дней</button>
    <button class="period-btn" onclick="loadStats(90, this)">90 дней</button>
    <button class="period-btn" onclick="loadStats(365, this)">365 дней</button>
  </div>
  <div id="statsList"><div class="loading">Загрузка...</div></div>
</div>

<div id="settings" class="page">
  <div class="settings-card">
    <div class="settings-title">Внешний вид</div>
    <div class="setting-row">
      <div>
        <div class="setting-label">Тема</div>
        <div class="setting-desc">Выбери оформление</div>
      </div>
      <div class="theme-options">
        <button class="theme-opt" id="theme-light" onclick="setTheme('light')">☀️ Светлая</button>
        <button class="theme-opt active" id="theme-dark" onclick="setTheme('dark')">🌙 Тёмная</button>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <div class="settings-title">Аккаунт</div>
    <div class="setting-row">
      <div>
        <div class="setting-label">Telegram ID</div>
        <div class="setting-desc" id="userIdDisplay">—</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://miruahabittracker.mooo.com/api';
let USER_ID = null;
let habits = [];
let loggedToday = new Set();

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); USER_ID = tg.initDataUnsafe?.user?.id; }
if (!USER_ID) USER_ID = 123;

document.getElementById('userIdDisplay').textContent = USER_ID;

const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const now = new Date();
document.getElementById('todayDate').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

const savedTheme = localStorage.getItem('theme') || 'dark';
setTheme(savedTheme);

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.remove('active'));
  document.getElementById('theme-' + theme)?.classList.add('active');
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json().catch(() => null);
}

async function loadHabits() {
  try {
    habits = await api('GET', `/habits?user_id=${USER_ID}`) || [];
    renderHabits();
  } catch(e) {
    document.getElementById('habitList').innerHTML = '<div class="loading">Ошибка загрузки</div>';
  }
}

function renderHabits() {
  const list = document.getElementById('habitList');
  const done = habits.filter(h => loggedToday.has(h.id)).length;
  const pct = habits.length ? Math.round(done / habits.length * 100) : 0;
  document.getElementById('progressLabel').textContent = `${done} из ${habits.length} выполнено`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('streakCount').textContent = done;

  if (!habits.length) { list.innerHTML = '<div class="empty">Добавь первую привычку</div>'; return; }
  list.innerHTML = habits.map(h => {
    const isDone = loggedToday.has(h.id);
    return `<div class="habit-card ${isDone ? 'done' : ''}" id="card-${h.id}">
      <button class="check-btn" onclick="toggleLog(${h.id})">${isDone ? '✓' : ''}</button>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-meta">${isDone ? 'Выполнено сегодня' : 'Не отмечено'}</div>
      </div>
      <button class="delete-btn" onclick="deleteHabit(${h.id})">✕</button>
    </div>`;
  }).join('');
}

async function addHabit() {
  const input = document.getElementById('newHabit');
  const name = input.value.trim();
  if (!name) return;
  try {
    await api('POST', `/habits?user_id=${USER_ID}&name=${encodeURIComponent(name)}`);
    input.value = '';
    await loadHabits();
  } catch(e) {}
}

async function deleteHabit(id) {
  try {
    await api('DELETE', `/habits/${id}`);
    loggedToday.delete(id);
    await loadHabits();
  } catch(e) {}
}

async function toggleLog(id) {
  if (loggedToday.has(id)) return;
  try {
    await api('POST', `/habits/${id}/log?user_id=${USER_ID}`);
    loggedToday.add(id);
    renderHabits();
  } catch(e) {}
}

async function loadStats(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('statsList');
  el.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const stats = await api('GET', `/stats/${days}?user_id=${USER_ID}`) || [];
    if (!stats.length) { el.innerHTML = '<div class="loading">Нет данных</div>'; return; }
    el.innerHTML = stats.map(s => {
      const pct = Math.round(s.completed_count / days * 100);
      const cls = pct >= 80 ? 'bar-green' : pct >= 50 ? 'bar-yellow' : 'bar-red';
      const color = pct >= 80 ? '#4ade80' : pct >= 50 ? '#fbbf24' : '#f87171';
      return `<div class="stat-card">
        <div class="stat-header">
          <span class="stat-name">${s.name}</span>
          <span class="stat-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div class="loading">Ошибка загрузки</div>'; }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'stats') loadStats(30, document.querySelector('.period-btn'));
}

document.getElementById('newHabit').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

loadHabits();
</script>
</body>
</html>
