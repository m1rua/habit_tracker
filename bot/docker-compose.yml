services:
  bot:
    build: .
    env_file:
      - .env
    depends_on: 
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_DB: habits
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
  